<script src="js/jquery.min.js"></script>

<script>

function compareDevice(a, b) {
        return parseInt(b.hardware_string) - parseInt(a.hardware_string);
}
    
function getRequest() {
        
    var request;
    if (window.XMLHttpRequest) {
        request  = new XMLHttpRequest();
    } else {
        request = new ActiveXObject();
    }
   return request;
}

function getDeviceData() {
    
    var device_data = new Array();
    let xhr = getRequest();
    xhr.open('Get','data/ipads.json');
    xhr.onreadystatechange = () => {
        if (xhr.readyState === 4 && xhr.status === 200) { 
            device_data = JSON.parse(xhr.responseText);
            alert(device_data.length);
        }
    }
    xhr.send();
    return device_data;
}

let devices = getDeviceData();
console.log("Got " + devices.length + " devices");
for (let i=0; i < devices.length; i++) {
    console.log(devices[i].common_name)
}
//devices.sort(compareDevice);

</script>
