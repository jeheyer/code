<script src="../js/canvasjs.min.js"></script>

<script>

    function MakeChart(loan_amount, payments) {
    
        // Initialize arrays for the lines to draw
        let principalArray = [];
        let interestArray = [];
        let equityArray = [];

        // Calculate and store data points for the chart
        for (let i = 0; i < payments.length; i++) {
            principalArray.push({ x: i, y: payments[i].remainingBalance });
            interestArray.push({ x: i, y: payments[i].sumOfInterestPayments })
            equityArray.push({ x: i, y: payments[i].sumOfPrinciple });
        }

        // Set parameters for the chart
        var chart = new CanvasJS.Chart("chartContainer", {
            theme: "light2",
            title: { text: "Payment Chart"  },
            axisX: { title: "Year Number", interval: 1},
            axisY: { title: "Principal/Equity", prefix: "$" },
            axisY2: { title: "Interest Paid", prefix: "$" },
            data: [
                { 
                    type: "line",
                    name: "Principal",
                    color: "#0000FF",
                    axisYIndex: 0,
                    showInLegend: true,
                    dataPoints: principalArray
                }, 
                {
                    type: "line",
                    name: "Equity",
                    color: "#00FF00",
                    axisYIndex: 1,
                    showInLegend: true,
                    dataPoints: equityArray 
                },
                {
                    type: "line",
                    name: "Interest",
                    color: "#FF0000",
                    axisYType: "secondary",
                    showInLegend: true,
                    dataPoints: interestArray 
                }
            ]
        });

        // Draw the chart
        if (loan_amount)
                chart.render();

}

function rangeCheck(num, description, min, max, units) {
          
    if (!isNaN(num) && num >= min && num <= max) {
        // Success
        return 0;
    } else {
        // Failure
        let errormsg = description + " must be between " + min + " and " + max;
        if (units)
            errormsg += " " + units;        
        throwError(errormsg);
        return 1;
    }    
}

function throwError(message, value) {
        
    // Alert the user and log the error message in the console
    alert(message);
    throw new Error (message);
}

function GetLoanData() {
        
    var output = {};
    //let url = `https://freebsd.lan.j5.org/mortgage.cgi?${location.search.substr(1)}`;
    let url = `https://python.j5.org/mortgage.cgi?${location.search.substr(1)}`;
    $.ajax({ url: url,
        async: false,
        dataType: 'json',
        success: function(data) { output = data; }
    });
    
    return output;
}

</script>
